# Hard limits per PRD §6.1 — these are ceilings. The Pydantic validator caps
# each field at its PRD-specified maximum; attempts to loosen them raise.
max_position_pct: 0.30           # reject any order that would push a position past 30% of equity
max_daily_loss_pct: 0.05         # flatten + halt 24h
max_monthly_drawdown_pct: 0.15   # flatten + halt until manual restart
max_order_size_pct: 0.20         # reject, require override
max_price_deviation_pct: 0.01    # reject, re-price
target_annual_vol: 0.10          # portfolio-level target (10%)
max_gross_exposure: 1.0          # no leverage in V1
killswitch_file: /var/run/quant/HALT
