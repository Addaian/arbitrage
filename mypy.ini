[mypy]
python_version = 3.12
mypy_path = src
packages = quant
namespace_packages = True
explicit_package_bases = True

# Defaults for the whole project — permissive to allow incremental typing.
ignore_missing_imports = True
warn_unused_configs = True
warn_return_any = True
warn_unused_ignores = True
warn_redundant_casts = True
no_implicit_optional = True
check_untyped_defs = True

# Strict mode for the critical modules per PRD §7.4.
[mypy-quant.risk.*]
strict = True
disallow_any_explicit = True

[mypy-quant.execution.*]
strict = True
disallow_any_explicit = True

[mypy-quant.portfolio.*]
strict = True

# Loose for third-party integrations that leak Any.
[mypy-vectorbt.*]
ignore_errors = True

[mypy-hmmlearn.*]
ignore_errors = True

[mypy-pandas_ta.*]
ignore_errors = True
