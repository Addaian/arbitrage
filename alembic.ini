[alembic]
script_location = migrations
prepend_sys_path = src
version_path_separator = os
path_separator = os
output_encoding = utf-8

# Database URL is set dynamically in migrations/env.py from quant.config.Settings.
# This placeholder is here only to satisfy alembic's config parser.
sqlalchemy.url = driver://user:pass@host/db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
