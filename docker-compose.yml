services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: quant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quant_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-quant}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - quant_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quant} -d ${POSTGRES_DB:-quant}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  quant_pgdata:
