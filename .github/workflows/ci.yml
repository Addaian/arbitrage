name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict on risk/execution/portfolio)
        run: uv run mypy src/quant/risk src/quant/execution src/quant/portfolio --strict

      - name: Pytest (unit)
        run: uv run pytest tests/unit -v --cov=src/quant --cov-report=term-missing

  strategy-artifact-gate:
    # Wave 14: any PR touching `src/quant/signals/*.py` must also update
    # `docs/strategies/*.md` so reviewers have a fresh validation report.
    # Runs on PRs only — push to main is not gated.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git diff against the base

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Strategy-artifact presence gate
        run: uv run python scripts/check_strategy_artifacts.py --base origin/${{ github.base_ref }}
